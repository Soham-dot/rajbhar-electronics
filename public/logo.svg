<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#20c997"/>
      <stop offset="100%" stop-color="#12b886"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.25)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="120" height="120" rx="26" fill="url(#bg)"/>
  <rect width="120" height="120" rx="26" fill="url(#shine)"/>

  <!-- TV Screen outline -->
  <rect x="22" y="24" width="76" height="52" rx="8" stroke="#fff" stroke-width="3.5" fill="none" opacity="0.95"/>
  
  <!-- Screen bezel highlight -->
  <rect x="28" y="30" width="64" height="40" rx="4" fill="rgba(255,255,255,0.08)"/>

  <!-- TV Stand -->
  <rect x="44" y="78" width="32" height="4" rx="2" fill="#fff" opacity="0.9"/>
  <rect x="38" y="84" width="44" height="3.5" rx="1.75" fill="#fff" opacity="0.7"/>

  <!-- "RE" text inside screen -->
  <text x="60" y="56" fill="#fff" font-size="28" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-weight="800" text-anchor="middle" dominant-baseline="middle" letter-spacing="2">RE</text>

  <!-- Signal waves (top-right of TV) -->
  <path d="M88 28 C91 25 95 25 98 28" stroke="#fff" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.6"/>
  <path d="M86 23 C91 18 97 18 102 23" stroke="#fff" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.4"/>

  <!-- Circuit dot accents -->
  <circle cx="30" cy="92" r="2.5" fill="#fff" opacity="0.35"/>
  <line x1="32.5" y1="92" x2="38" y2="92" stroke="#fff" stroke-width="1.5" opacity="0.25"/>
  <circle cx="90" cy="92" r="2.5" fill="#fff" opacity="0.35"/>
  <line x1="82" y1="92" x2="87.5" y2="92" stroke="#fff" stroke-width="1.5" opacity="0.25"/>

  <!-- Power indicator dot -->
  <circle cx="33" cy="71" r="2" fill="#63e6be"/>
</svg>