<svg xmlns="http://www.w3.org/2000/svg" width="900" height="700" viewBox="0 0 900 700" fill="none">
  <!-- Large Flat TV -->
  <rect x="50" y="30" width="180" height="120" rx="10" stroke="#374151" stroke-width="3"/>
  <rect x="110" y="150" width="60" height="10" rx="3" stroke="#374151" stroke-width="2.5"/>
  <rect x="90" y="160" width="100" height="5" rx="2.5" stroke="#374151" stroke-width="2.5"/>
  <line x1="70" y1="60" x2="210" y2="60" stroke="#374151" stroke-width="1.5" opacity="0.5"/>
  <line x1="70" y1="80" x2="180" y2="80" stroke="#374151" stroke-width="1.5" opacity="0.5"/>
  <line x1="70" y1="100" x2="200" y2="100" stroke="#374151" stroke-width="1.5" opacity="0.5"/>

  <!-- Remote Control -->
  <rect x="720" y="40" width="55" height="130" rx="16" stroke="#374151" stroke-width="3"/>
  <circle cx="747" cy="75" r="12" stroke="#374151" stroke-width="2.5"/>
  <line x1="741" y1="75" x2="753" y2="75" stroke="#374151" stroke-width="2"/>
  <line x1="747" y1="69" x2="747" y2="81" stroke="#374151" stroke-width="2"/>
  <rect x="733" y="100" width="28" height="5" rx="2.5" stroke="#374151" stroke-width="2"/>
  <rect x="733" y="112" width="28" height="5" rx="2.5" stroke="#374151" stroke-width="2"/>
  <rect x="733" y="124" width="28" height="5" rx="2.5" stroke="#374151" stroke-width="2"/>
  <circle cx="740" cy="148" r="4" fill="#374151"/>
  <circle cx="754" cy="148" r="4" fill="#374151"/>

  <!-- Mounted TV with play button -->
  <rect x="340" y="450" width="220" height="140" rx="8" stroke="#374151" stroke-width="3"/>
  <rect x="420" y="590" width="80" height="12" rx="3" stroke="#374151" stroke-width="2.5"/>
  <rect x="395" y="602" width="130" height="5" rx="2.5" stroke="#374151" stroke-width="2.5"/>
  <circle cx="450" cy="520" r="20" stroke="#374151" stroke-width="2" opacity="0.4"/>
  <polygon points="443,512 443,528 460,520" fill="#374151" opacity="0.4"/>

  <!-- Screwdriver -->
  <line x1="750" y1="320" x2="810" y2="260" stroke="#374151" stroke-width="3.5"/>
  <rect x="805" y="245" width="40" height="12" rx="3" transform="rotate(-45 805 245)" stroke="#374151" stroke-width="2.5"/>
  <line x1="747" y1="323" x2="738" y2="332" stroke="#374151" stroke-width="5" stroke-linecap="round"/>

  <!-- Wrench -->
  <line x1="80" y1="440" x2="140" y2="380" stroke="#374151" stroke-width="3.5"/>
  <path d="M140 380 C148 366 164 360 172 368 C180 376 174 392 160 400 Z" stroke="#374151" stroke-width="2.5" fill="none"/>
  <circle cx="76" cy="446" r="7" stroke="#374151" stroke-width="2.5"/>

  <!-- Circuit Board Pattern -->
  <circle cx="450" cy="80" r="6" fill="#374151"/>
  <line x1="456" y1="80" x2="520" y2="80" stroke="#374151" stroke-width="2"/>
  <line x1="520" y1="80" x2="520" y2="130" stroke="#374151" stroke-width="2"/>
  <circle cx="520" cy="136" r="6" fill="#374151"/>
  <line x1="444" y1="80" x2="390" y2="80" stroke="#374151" stroke-width="2"/>
  <line x1="390" y1="80" x2="390" y2="40" stroke="#374151" stroke-width="2"/>
  <circle cx="390" cy="34" r="6" fill="#374151"/>
  <line x1="450" y1="86" x2="450" y2="150" stroke="#374151" stroke-width="2"/>
  <circle cx="450" cy="156" r="6" fill="#374151"/>
  <line x1="456" y1="130" x2="490" y2="130" stroke="#374151" stroke-width="1.5"/>
  <circle cx="490" cy="130" r="4" fill="#374151"/>

  <!-- WiFi Signal -->
  <path d="M620 500 C635 485 660 485 675 500" stroke="#374151" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M612 488 C635 468 660 468 683 488" stroke="#374151" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M604 476 C635 451 660 451 691 476" stroke="#374151" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <circle cx="648" cy="508" r="5" fill="#374151"/>

  <!-- Power Plug -->
  <circle cx="220" cy="310" r="22" stroke="#374151" stroke-width="2.5"/>
  <line x1="210" y1="300" x2="210" y2="318" stroke="#374151" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="230" y1="300" x2="230" y2="318" stroke="#374151" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="220" y1="332" x2="220" y2="370" stroke="#374151" stroke-width="2.5"/>
  <path d="M210 370 Q220 385 230 370" stroke="#374151" stroke-width="2" fill="none"/>

  <!-- Multimeter -->
  <rect x="760" y="480" width="70" height="100" rx="10" stroke="#374151" stroke-width="2.5"/>
  <circle cx="795" cy="515" r="18" stroke="#374151" stroke-width="2"/>
  <line x1="795" y1="515" x2="806" y2="504" stroke="#374151" stroke-width="2" stroke-linecap="round"/>
  <circle cx="782" cy="555" r="5" stroke="#374151" stroke-width="2"/>
  <circle cx="808" cy="555" r="5" stroke="#374151" stroke-width="2"/>

  <!-- Soldering Iron -->
  <line x1="40" y1="600" x2="120" y2="540" stroke="#374151" stroke-width="3"/>
  <line x1="120" y1="540" x2="142" y2="524" stroke="#374151" stroke-width="5" stroke-linecap="round"/>
  <circle cx="36" cy="604" r="5" fill="#374151" opacity="0.5"/>
  <circle cx="30" cy="610" r="3" fill="#374151" opacity="0.3"/>

  <!-- Antenna Signal -->
  <line x1="660" y1="230" x2="660" y2="280" stroke="#374151" stroke-width="2.5"/>
  <circle cx="660" cy="224" r="4" fill="#374151"/>
  <path d="M645 240 C650 232 670 232 675 240" stroke="#374151" stroke-width="2" fill="none"/>
  <path d="M638 250 C648 238 672 238 682 250" stroke="#374151" stroke-width="2" fill="none"/>

  <!-- Dot Grid -->
  <circle cx="540" cy="300" r="3.5" fill="#374151"/>
  <circle cx="565" cy="300" r="3.5" fill="#374151"/>
  <circle cx="590" cy="300" r="3.5" fill="#374151"/>
  <circle cx="540" cy="325" r="3.5" fill="#374151"/>
  <circle cx="565" cy="325" r="3.5" fill="#374151"/>
  <circle cx="590" cy="325" r="3.5" fill="#374151"/>
  <circle cx="540" cy="350" r="3.5" fill="#374151"/>
  <circle cx="565" cy="350" r="3.5" fill="#374151"/>
  <circle cx="590" cy="350" r="3.5" fill="#374151"/>
  <circle cx="540" cy="375" r="3.5" fill="#374151"/>
  <circle cx="565" cy="375" r="3.5" fill="#374151"/>
  <circle cx="590" cy="375" r="3.5" fill="#374151"/>

  <!-- HDMI Connector -->
  <rect x="300" y="260" width="35" height="18" rx="3" stroke="#374151" stroke-width="2.5"/>
  <rect x="307" y="265" width="8" height="8" rx="1" stroke="#374151" stroke-width="1.5"/>
  <rect x="320" y="265" width="8" height="8" rx="1" stroke="#374151" stroke-width="1.5"/>
  <line x1="335" y1="269" x2="380" y2="269" stroke="#374151" stroke-width="2.5"/>

  <!-- Capacitor -->
  <line x1="160" y1="220" x2="160" y2="240" stroke="#374151" stroke-width="2.5"/>
  <line x1="148" y1="240" x2="172" y2="240" stroke="#374151" stroke-width="2.5"/>
  <line x1="148" y1="248" x2="172" y2="248" stroke="#374151" stroke-width="2.5"/>
  <line x1="160" y1="248" x2="160" y2="268" stroke="#374151" stroke-width="2.5"/>
</svg>
